filebeat.autodiscover:
  providers:
    - type: docker
      # which means dots in docker labels are replaced with _ by default
      labels.dedot: true
      templates:
        - condition:
            contains:
              docker.container.labels.collect_logs_with_filebeat: "true"
          config:
            - type: container
              format: docker
              paths:
                - "/var/lib/docker/containers/${data.docker.container.id}/*.log"
              multiline:
                pattern: '^[[:space:]]+(at|\\.\\.\\.|Caused by|Suppressed)'
                match: after
                max_lines: 5000
                timeout: 10s
              exclude_lines: ["^\\s+[\\-`('.|_]"]  # drop ascii-art lines
              processors:
                - decode_json_fields:
                    when.equals:
                      docker.container.labels.decode_log_event_to_json_object: "true"
                    fields: ["message"]
                    target: ""
                    overwrite_keys: true
                    add_error_key: true

# output.console.pretty: true
output.logstash:
  hosts: ["logstash:5044"]
  # index: myspringboot

logging.metrics.enabled: true  